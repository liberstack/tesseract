<!DOCTYPE html>
<html lang="pt-BR">

<head>
     <meta charset="UTF-8" />
     <meta name="viewport" content="width=device-width, initial-scale=1.0" />
     <title>Tesseract</title>
     <link rel="stylesheet" href="./style.css" />
</head>

<body>

     <div id="info">
          <span id="shape-name">Tesseract</span><br />
          <span id="shape-sub">Hypercube 4D · 16 verts · 32 edges</span><br />
          Rotations: XY, XW, YZ, ZW
     </div>

     <!-- Controls panel -->
     <div id="controls">
          <div class="ctrl-title">SHADOW PROJ.</div>
          <button class="ctrl-btn" id="btn-shadow" style="width:100%;">OFF</button>

          <div class="ctrl-title" style="margin-top:14px;">ROTATION 4D</div>
          <div id="matrix-display"></div>
     </div>

     <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
     <script src="./src/app.js"></script>

</body>

</html>
